name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Lint, build, and integration test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python lint tools
        run: python -m pip install ruff==0.8.6

      - name: Lint Python with ruff
        run: ruff check app tests

      - name: Scan Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Create CI environment file
        run: cp .env.example .env

      - name: Build Docker image
        run: docker build -t statuspulse:${{ github.sha }} .

      - name: Start full stack
        run: docker compose up -d --build

      - name: Run integration tests
        env:
          BASE_URL: http://localhost:8000
          REPORT_FILE: reports/integration.log
        run: bash tests/test_integration.sh

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: reports/
          if-no-files-found: warn
