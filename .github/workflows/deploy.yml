name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Check out repository at tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute image tags
        id: image
        run: |
          IMAGE_NAME="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$IMAGE_NAME:${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$IMAGE_NAME:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            -t "${{ steps.image.outputs.sha_tag }}" \
            -t "${{ steps.image.outputs.latest_tag }}" \
            .
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.latest_tag }}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          script: |
            cd /opt/statuspulse
            APP_IMAGE="${{ steps.image.outputs.sha_tag }}" HEALTH_URL="${{ secrets.APP_HEALTH_URL }}" ./scripts/deploy.sh

      - name: Post-deployment health check
        env:
          APP_HEALTH_URL: ${{ secrets.APP_HEALTH_URL }}
        run: curl -fsS --retry 10 --retry-delay 5 --max-time 10 "$APP_HEALTH_URL"

      - name: Send Discord notification
        if: always() && env.DISCORD_WEBHOOK_URL != ''
        env:
          JOB_STATUS: ${{ job.status }}
          IMAGE_TAG: ${{ steps.image.outputs.sha_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"StatusPulse deploy ${JOB_STATUS}: ${IMAGE_TAG}\n${RUN_URL}\"}" \
            "$DISCORD_WEBHOOK_URL"
