name: statuspulse-prod

x-app-common: &app-common
  image: ${APP_IMAGE:-ghcr.io/owner/statuspulse:latest}
  env_file:
    - .env
  environment:
    DB_HOST: postgres
    REDIS_HOST: redis
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import json, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); d=json.load(r); raise SystemExit(0 if d.get('status') == 'healthy' else 1)",
      ]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s
  mem_limit: 256m
  memswap_limit: 256m
  restart: unless-stopped
  networks:
    - statuspulse-net

services:
  app-blue:
    <<: *app-common
    container_name: statuspulse-app-blue
    profiles:
      - blue

  app-green:
    <<: *app-common
    container_name: statuspulse-app-green
    profiles:
      - green

  postgres:
    image: postgres:16-alpine
    container_name: statuspulse-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-statuspulse}
      POSTGRES_USER: ${DB_USER:-statuspulse}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    networks:
      - statuspulse-net

  redis:
    image: redis:7-alpine
    container_name: statuspulse-redis
    env_file:
      - .env
    command:
      [
        "sh",
        "-c",
        "exec redis-server --appendonly yes $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}",
      ]
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli $${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep PONG",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    memswap_limit: 128m
    restart: unless-stopped
    networks:
      - statuspulse-net

  nginx:
    image: nginx:1.27-alpine
    container_name: statuspulse-nginx
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/conf.d/statuspulse_upstream.conf:/etc/nginx/conf.d/statuspulse_upstream.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 128m
    memswap_limit: 128m
    restart: unless-stopped
    networks:
      - statuspulse-net

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: statuspulse-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    profiles:
      - certbot

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: statuspulse-uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    networks:
      - statuspulse-net

volumes:
  postgres-data:
  redis-data:
  uptime-kuma-data:

networks:
  statuspulse-net:
    name: statuspulse-net
    driver: bridge
